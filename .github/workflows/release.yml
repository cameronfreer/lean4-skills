name: release

# Creates the git tag + GitHub release for a version bump as soon as it
# lands on main, so the latest release can no longer drift behind
# plugin.json. (Releases used to be cut by hand and stalled at v4.4.10
# while main shipped v4.5.5 — which is why the docs' `gh skill` commands
# all pin `@main`.)
#
# The workflow deliberately contains no versioning logic of its own:
# lint_docs.sh Check 23 — enforced on every PR by lint.yml's
# release-contract job — gates plugin.json ↔ marketplace.json ↔
# CHANGELOG consistency, so by the time a commit is on main the
# plugin.json version is authoritative and its CHANGELOG section exists.
# This job just reads that version and publishes it, extracting notes
# with the same tools/release_notes.sh the PR gate validated.
#
# Idempotent by construction: it exits early (successfully) when a
# release for the current version already exists, so re-runs and manual
# dispatches never duplicate a release.
#
# Two guards against racing runs (workflow runs are concurrent by
# default, and each run tags its own commit): the push trigger is scoped
# to plugin.json — the only file whose change can mean a new version —
# and the concurrency queue below serializes any runs that do trigger.

on:
  push:
    branches: [main]
    # Only version bumps can need a release, and Check 23 ties the
    # version to this file. Scoping the trigger keeps unrelated merges
    # from entering the race at all — without it, a non-bump push
    # landing just after a bump could win the tag-creation race and
    # attach vX.Y.Z to its own (later) commit.
    paths:
      - plugins/lean4/.claude-plugin/plugin.json
  # Manual trigger for backfill/recovery: cuts the release for whatever
  # version is currently on main (e.g. after a transient failure, or a
  # bump that landed without touching plugin.json — impossible today,
  # but the paths filter above would miss it).
  workflow_dispatch:

# Serialize release runs. `queue: max` keeps every pending run queued
# (the default `single` replaces the pending run, which could silently
# skip a version if bumps land rapid-fire). GitHub does not guarantee
# queue ordering, but each run is self-contained — it reads the version
# from its own commit's manifest and tags its own commit — so execution
# order doesn't affect correctness, only which run no-ops. Without
# serialization, two closely spaced runs could both observe "no release
# for this version yet" — one would then fail at create.
# cancel-in-progress stays unset: it's a validation error combined with
# queue: max, and cancelling a half-finished release run is exactly
# what we don't want.
concurrency:
  group: lean4-release
  queue: max

# The default GITHUB_TOKEN is read-only; tag + release creation needs
# contents: write. Scoped to the whole workflow since it has one job.
permissions:
  contents: write

jobs:
  release:
    # Guards the workflow_dispatch path: the dispatch UI allows picking
    # any branch, but releases must only ever be cut from main.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA (not the floating v5 tag) because
      # this workflow holds contents: write — an immutable reference
      # removes the tag-retarget supply-chain vector. Credentials are
      # not persisted: every later step authenticates explicitly via
      # GH_TOKEN, and local git commands only read history. Full history
      # (fetch-depth: 0) is needed by the dispatch-recovery path below,
      # which validates an existing tag by ancestry + manifest content.
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read version from plugin.json
        id: version
        run: |
          version=$(python3 -c "import json; print(json.load(open('plugins/lean4/.claude-plugin/plugin.json'))['version'])")
          # Guard against a malformed manifest producing a garbage tag
          # like "v" or "vNone". Anchored X.Y.Z only — also keeps the
          # value safe to interpolate into later ${{ }} expressions.
          echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "plugin.json version '$version' is not X.Y.Z" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: released
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json tagName > /dev/null 2>&1; then
            echo "Release $tag already exists — nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"
          # No release yet — but if the tag already exists (a previous
          # run tagged and then failed before publishing, or the tag was
          # pre-created by hand), `gh release create` would silently
          # attach the release to wherever that tag points: --target
          # only applies when the tag is being created, it never
          # retargets an existing tag. What makes an existing tag safe
          # to reuse depends on how this run was triggered.
          if tag_sha=$(gh api "repos/$GITHUB_REPOSITORY/commits/$tag" --jq '.sha' 2>/dev/null); then
            if [ "${{ github.event_name }}" = "push" ]; then
              # A push run releases its own commit, so the tag must
              # already point exactly there.
              if [ "$tag_sha" != "$GITHUB_SHA" ]; then
                echo "Tag $tag exists and points to $tag_sha, not $GITHUB_SHA — refusing to attach a release to it." >&2
                echo "If a previous release run tagged this version and then failed before publishing, recover via workflow_dispatch (it validates the tag by ancestry + manifest instead of strict equality). Do NOT retarget the tag — that destroys release provenance." >&2
                exit 1
              fi
            else
              # Dispatch recovery: main may legitimately have advanced
              # past the version-bump commit the tag correctly points
              # to, so equality with GITHUB_SHA is the wrong test.
              # Accept the tag iff it is an ancestor of the dispatched
              # head AND the manifest at that commit carries exactly
              # this version; the release then attaches to the tag's
              # commit, preserving provenance.
              if ! git merge-base --is-ancestor "$tag_sha" "$GITHUB_SHA"; then
                echo "Tag $tag points to $tag_sha, which is not an ancestor of $GITHUB_SHA — refusing to attach a release to it." >&2
                exit 1
              fi
              tag_version=$(git show "$tag_sha:plugins/lean4/.claude-plugin/plugin.json" | python3 -c "import json, sys; print(json.load(sys.stdin)['version'])")
              if [ "$tag_version" != "${{ steps.version.outputs.version }}" ]; then
                echo "Tag $tag points to $tag_sha, whose plugin.json version is $tag_version, not ${{ steps.version.outputs.version }} — refusing to attach a release to it." >&2
                exit 1
              fi
            fi
            echo "Tag $tag already exists and passed validation — will reuse it."
          fi

      - name: Extract this version's CHANGELOG section as release notes
        if: steps.released.outputs.exists == 'false'
        run: |
          # Same script Check 23 gates PRs with: requires the exact
          # "## vX.Y.Z" heading and a non-empty section, failing loudly
          # (rather than shipping blank notes) if main is inconsistent.
          bash plugins/lean4/tools/release_notes.sh \
            "${{ steps.version.outputs.version }}" > "$RUNNER_TEMP/notes.md"

      - name: Create tag + GitHub release
        if: steps.released.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The tag either doesn't exist (created here at --target) or
          # passed the event-sensitive validation above, in which case
          # gh ignores --target and the release attaches to the tag's
          # existing commit (safe reuse after a run that tagged but
          # failed before publishing).
          gh release create "v${{ steps.version.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/notes.md"
